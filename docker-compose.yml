services:
  postgres:
    image: postgres:16-alpine
    container_name: abacus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: abacus
      POSTGRES_PASSWORD: abacus_dev_password
      POSTGRES_DB: abacus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abacus -d abacus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
