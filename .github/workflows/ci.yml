# CI for Abacus
#
# Three parallel jobs: static (typecheck/lint/format), unit (Vitest), e2e (Playwright).
# Runs on every PR and every push to main.
#
# No real secrets used. AUTH_SECRET below is a known CI placeholder — production
# deploys will source AUTH_SECRET from secrets.AUTH_SECRET when deploy CI lands
# in a separate chore.
#
# Setup note: pnpm/action-setup@v4 uses the runner's pre-installed Node 20 to
# bootstrap itself (via process.execPath, regardless of PATH), which fails
# because pnpm 11.x requires Node >=22.13. Instead we install Node 24 first
# (from .nvmrc), then install pnpm via `npm install -g` so it runs under Node 24.
# We configure the pnpm store cache manually because actions/setup-node's
# `cache: pnpm` option needs pnpm pre-installed at setup-node time.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    name: Static analysis (typecheck / lint / format)
    runs-on: ubuntu-24.04
    env:
      # prisma.config.ts requires DATABASE_URL to resolve even for `prisma generate`,
      # which doesn't actually connect. Placeholder value satisfies the env() lookup.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        run: npm install -g pnpm@11.1.2

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        id: typecheck
        run: pnpm typecheck

      - name: Lint
        id: lint
        run: pnpm lint

      - name: Format check
        id: format
        run: pnpm format:check

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Static analysis"
            echo ""
            echo "| Check | Outcome |"
            echo "| --- | --- |"
            echo "| Typecheck (\`pnpm typecheck\`) | ${{ steps.typecheck.outcome == 'success' && '✅ passed' || '❌ failed' }} |"
            echo "| Lint (\`pnpm lint\`) | ${{ steps.lint.outcome == 'success' && '✅ passed' || steps.lint.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
            echo "| Format (\`pnpm format:check\`) | ${{ steps.format.outcome == 'success' && '✅ passed' || steps.format.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-24.04
    env:
      # prisma.config.ts requires DATABASE_URL even for `prisma generate`.
      # Vitest's tests/setup.ts also seeds DATABASE_URL/AUTH_SECRET/AUTH_URL
      # with placeholders if missing, but those come too late for `prisma generate`.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        run: npm install -g pnpm@11.1.2

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run unit tests
        id: unit
        run: pnpm test

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Unit tests (Vitest)"
            echo ""
            echo "Outcome: ${{ steps.unit.outcome == 'success' && '✅ passed' || '❌ failed' }}"
            echo ""
            echo "Full results are in the **Run unit tests** step output above."
          } >> "$GITHUB_STEP_SUMMARY"

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: postgresql://abacus:abacus_dev_password@localhost:5432/abacus?schema=public
      AUTH_SECRET: ci-test-secret-32-chars-or-more-padding
      AUTH_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: abacus
          POSTGRES_PASSWORD: abacus_dev_password
          POSTGRES_DB: abacus
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U abacus -d abacus"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        run: npm install -g pnpm@11.1.2

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy --schema=db/schema.prisma

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## E2E tests (Playwright)"
            echo ""
            echo "Outcome: ${{ steps.e2e.outcome == 'success' && '✅ passed' || '❌ failed' }}"
            echo ""
            echo "📦 The full HTML report is uploaded as the **playwright-report** artifact"
            echo "(download from the **Summary** tab of this run). Failures (if any) also"
            echo "appear as inline annotations on the PR via the GitHub reporter."
          } >> "$GITHUB_STEP_SUMMARY"
